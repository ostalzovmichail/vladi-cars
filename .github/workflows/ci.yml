name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.11.0"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vladi
          POSTGRES_PASSWORD: vladi_secret
          POSTGRES_DB: vladi_cars
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma clients
        run: |
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/auth/.env
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/catalog/.env
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/cart/.env
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/orders/.env
          pnpm prisma:generate

      - name: Push DB schema
        run: |
          for svc in auth catalog cart orders; do
            echo "--- Pushing $svc ---"
            cd apps/backend/$svc && npx prisma db push --accept-data-loss 2>&1 | tail -3 && cd ../../..
          done
        env:
          DATABASE_URL: postgresql://vladi:vladi_secret@localhost:5432/vladi_cars
          JWT_SECRET: ci-test-secret

      - name: Lint
        run: |
          cd apps/frontend && pnpm exec tsc --noEmit && cd ../..
          cd apps/backend/catalog && pnpm exec tsc --noEmit && cd ../../..
          cd apps/backend/auth && pnpm exec tsc --noEmit && cd ../../..
          cd apps/backend/cart && pnpm exec tsc --noEmit && cd ../../..
          cd apps/backend/orders && pnpm exec tsc --noEmit && cd ../../..
          cd apps/backend/api-gateway && pnpm exec tsc --noEmit && cd ../../..
        env:
          DATABASE_URL: postgresql://vladi:vladi_secret@localhost:5432/vladi_cars

      - name: Test
        run: |
          cd apps/backend/catalog && pnpm exec jest --forceExit && cd ../../..
          cd apps/backend/auth && pnpm exec jest --forceExit && cd ../../..
          cd apps/backend/cart && pnpm exec jest --forceExit && cd ../../..
          cd apps/backend/orders && pnpm exec jest --forceExit && cd ../../..
          cd apps/backend/api-gateway && pnpm exec jest --forceExit && cd ../../..
          cd apps/frontend && pnpm exec vitest run && cd ../..
        env:
          DATABASE_URL: postgresql://vladi:vladi_secret@localhost:5432/vladi_cars
          JWT_SECRET: ci-test-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-test]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: |
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/auth/.env
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/catalog/.env
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/cart/.env
          echo "DATABASE_URL=postgresql://vladi:vladi_secret@localhost:5432/vladi_cars" > apps/backend/orders/.env
          pnpm prisma:generate

      - run: pnpm build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/frontend/dist


